<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício HTML Básico</title>
</head>
<body>
    <!-- 
    EXERCÍCIO: Crie uma página pessoal simples com os seguintes elementos:
    
    1. Um título principal (h1) com seu nome
    2. Um subtítulo (h2) com algo sobre você
    3. Um parágrafo (p) com uma descrição sua
    4. Uma lista não ordenada (ul) com seus hobbies
    5. Um link (a) que redirecione para um site de sua preferência
    6. Uma lista ordenada (ol) com seus objetivos
    7. Uma imagem (img) - você pode usar uma URL de exemplo
    
   Complete o código abaixo!
    -->
    
    <!-- ESCREVA SEU CÓDIGO ABAIXO: -->
    
    <h1>[Seu Nome]</h1>
    
    <h2>[Seu Subtítulo]</h2>
    
    <p>[Sua Descrição]</p>
    
    <h3>Meus Hobbies:</h3>
    <ul>
        <li>[Hobby 1]</li>
        <li>[Hobby 2]</li>
        <li>[Hobby 3]</li>
    </ul>
    
    <p>Visite meu site favorito: <a href="[URL]">[Nome do Site]</a></p>
    
    <h3>Meus Objetivos:</h3>
    <ol>
        <li>[Objetivo 1]</li>
        <li>[Objetivo 2]</li>
        <li>[Objetivo 3]</li>
    </ol>
    
    <h3>Minha Foto:</h3>
    <img src="https://via.placeholder.com/300" alt="Minha foto">
    
    <!-- 
    DICA: Reveja as tags:
    - h1, h2, h3 = títulos
    - p = parágrafo
    - ul/ol = listas (não ordenada/ordenada)
    - li = item de lista
    - a href = link
    - img src = imagem
    -->
</body>
</html>
